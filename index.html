<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCB Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
  <h2>Welcome to GCB</h2>
  <img src="gcb-image.png" class="top-image">
  <p class="login-text">Login</p>
  <div class="input-row">
    <img src="https://flagcdn.com/w40/gh.png" class="flag">
    <span>233</span>
    <input type="text" placeholder="Enter Mobile Number">
  </div>
  <div class="input-row">
    <input type="password" placeholder="Enter Password">
  </div>
  <div class="forgot">Forgot Password</div>
  <button class="login-btn" onclick="goToOTP()">Login</button>
  <p class="register">Are you new to this app? <span>Register</span></p>
  <p class="version">Version: 2.12</p>
</div>

<!-- OTP PAGE -->
<div class="container hidden" id="otpPage">
  <h2>OTP Verification</h2>
  <p class="info">Enter the code sent to your phone</p>
  <div class="input-row">
    <input type="text" id="otpInput" placeholder="Enter OTP" disabled>
  </div>
  <button class="login-btn active" onclick="goToFace()">Verify</button>
</div>

<!-- FACE ID PAGE -->
<div class="container hidden" id="facePage">
  <h2>Face ID Verification</h2>
  <div class="face-box">
    <div class="scan-line"></div>
  </div>
  <p class="info">Scanning your face...</p>
</div>

<script>
function goToOTP() {
  // Debug alert to check function call
  // alert("goToOTP triggered");

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("otpPage").classList.remove("hidden");

  // Auto-fill OTP
  const otpCode = "349845";
  const otpInput = document.getElementById("otpInput");
  let i = 0;
  const interval = setInterval(() => {
    if (i < otpCode.length) {
      otpInput.value = otpCode.slice(0, i + 1);
      i++;
    } else {
      clearInterval(interval);
    }
  }, 500);
}

function goToFace() {
  document.getElementById("otpPage").classList.add("hidden");
  document.getElementById("facePage").classList.remove("hidden");

  setTimeout(() => {
    alert("⚠️ PHISHING DEMO:\n\nLogin details, OTP and Face ID would be captured.\n\n(No data was collected - simulation only)");
  }, 3000);
}
</script>

</body>
</html>
