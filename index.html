<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCB Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
  <h2>Welcome to GCB</h2>

  <img src="gcb-image.jpeg" class="top-image">

  <p class="login-text">Login</p>

  <div class="input-row">
    <i class="fa-solid fa-phone"></i>
    <img src="phone.jpeg"width="40px" height="40px"><img src="https://flagcdn.com/w40/gh.png" class="flag">
    <span>233</span>
    <input type="text" placeholder="Enter Mobile Number">
  </div>

  <div class="input-row">
    <i class="fa-solid fa-lock"></i>
    <img src="lock.jpeg"width="50px" height="50px">
    <input type="password" placeholder="Enter Password">
  </div>

  <div class="forgot">Forgot Password</div>

  <button class="login-btn" onclick="goToOTP()">Login</button>

  <p class="register">Are you new to this app? <span>Register</span></p>

  <!-- Help Icon -->
<div class="help-icon">?</div><br>

  <p class="version">Version: 2.12</p>
</div>





</body>
</html>
